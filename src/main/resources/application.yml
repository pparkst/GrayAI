spring:
    application:
        name: gray-ai

    datasource:
        url: jdbc:mysql://localhost:3306/gray_ai?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
        username: ${MYSQL_USERNAME}
        password: ${MYSQL_PASSWORD}
        driver-class-name: com.mysql.cj.jdbc.Driver

    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        properties:
            hibernate:
                format_sql: true
                dialect: org.hibernate.dialect.MySQL8Dialect
    threads:
        virtual:
            enabled: true
    
    ai:
        google:
            genai:
                api-key: ${GEMINI_API_KEY}
                chat:
                    options:
                        model: gemini-3.0-flush
                        temperature: 0.7

server:
    port: 8080